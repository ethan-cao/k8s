kind: Pod
apiVersion: v1

metadata:
  name: pod-test

  labels:
    app: alpine
    tier: free

  annotations:
    example.com/icon-url: "https://example.com/icon.png"

spec:
  # pick a particular scheduler
  schedulerName: my-scheduler

  # Run only once, When a pod is first created,
  # the process in the initContainer must run to a completion before the real container hosting the application starts.
  # for multiple initContainers, each is run one at a time in sequential order,
  # if any of the initContainers fail to complete, Kubernetes restarts the Pod repeatedly until the Init Container succeeds.
  initContainers:
    - name: init-myservice
      image: busybox
      command: ["echo", "initial service; done;"]

  volumes:
    - name: data-volume
      # Specifies that this is a hostPath volume type, which mounts a directory from the host node
      hostPath:
        # path on the host node's filesystem that will be mounted
        path: /data
        # path must be an existing directory
        type: Directory

  containers:
    - name: alpine
      image: alpine

      # command overrides ENTRYPOINT in Dockerfile
      command: ["/bin/sh", "-c"]
      # args overrides CMD in Dockerfile
      args: ["echo 'test' > /data/message.txt"]

      # set enviroment variables, or using configMap
      env:
        - name: TIME_ZONE_1
          value: GMT+1
        - name: TIME_ZONE_2
          value: GMT+2

      # Resources are requested per container, not per Pod.
      # The total resources requested by the Pod is the sum of all resources requested by all containers in the Pod
      resources:
        # guaranteed minimal amount of a resource to be used by a container.
        # this does not mean the container uses at least the requested amount of resources
        # the actual usage can be anywhere from 0 to the limit
        # if requests not specfieid, but limits specified, requests is set as limits
        requests:
          cpu: 500m
          memory: 128Mi
        # maximum amount of a resource to be used by a container
        limits:
          # best practice (in most cases) for CPU limt: DO NOT set CPU limit, so the container can use available CPU from the node
          cpu: 1000m     # the container will suffer CPU throttle, if it uses more than this limit
          memory: 256Mi  # the container will be OOM killed, if it uses more than this limit

      # specifies where and how volumes should be mounted in the container
      volumeMounts:
        #  volume will be mounted at the /volume1 directory inside the container
        - mountPath: /volume1
          # this is the name of the volumes to find the what this volumes is
          name: data-volume

      # container-level securityContext, this overrides pod-level securityContext
      securityContext:
        # user with this id will be running this pod
        runAsUser: 1000
        # capabilities is ONLY used in container level
        capabilities:
          add: ["SYS_TIME"]


      # Container starts
      #     ↓
      # startupProbe (if defined)
      #     ↓ (once passed)
      # livenessProbe + readinessProbe (run in parallel)

      # Purpose: Determines if the application inside the container has started successfully.
      # Runs only once during container startup
      # While running, it disables liveness and readiness probes
      # If it fails (exceeds failureThreshold), the container is killed and restarted
      # If it succeeds, it never runs again
      startupProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      # Purpose: Determines if the container is still alive and healthy.
      # Runs continuously throughout the container's lifecycle
      # If it fails, the container is killed and restarted
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      # Purpose: Determines if the container is ready to receive traffic.
      # Runs continuously throughout the container's lifecycle
      # If it fails, the pod is removed from Service endpoints (no traffic sent to it), but the container is NOT restarted
      # If it succeeds, traffic resumes
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3


  # pod-level securityContext
  securityContext:
    # user with this id will be running this pod
    runAsUser: 1000

---
# LimitRange defines, in the same namespace, default resource requst/limit for each container or pod
apiVersion: v1
kind: LimitRange
metadata:
  name: example-limitrange
spec:
  limits:
    - default: # default limit
        cpu: "700m"
        memory: 512Mi
      defaultRequest: # default request
        cpu: "500m"
        memory: 256Mi
      max:
        cpu: "1"
        memory: 512Mi
      min:
        cpu: "300m"
        memory: 128Mi
      type: Container # could be a pod

---
# ResourceQuota creates, in the same namespace, hard limit for TOTAL resource requests/limits
apiVersion: v1
kind: ResourceQuota
metadata:
  name: example-resource-quota
spec:
  hard:
    pods: "10" # Maximum number of pods in the namespace
    requests.cpu: "2" # Maximum total CPU requests
    requests.memory: 4Gi # Maximum total memory requests
    limits.cpu: "4" # Maximum total CPU limits
    limits.memory: 8Gi # Maximum total memory limits
